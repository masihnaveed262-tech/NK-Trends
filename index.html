<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Deals Pakistan</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
        }
        p.urdu-text {
            font-size: 20px;
            color: #2c3e50;
            line-height: 1.8;
            direction: rtl;
            margin-bottom: 40px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 20px;
            max-width: 400px;
            margin: 0 auto;
            background: #fafafa;
        }
        .product-title {
            font-size: 22px;
            color: #333;
            margin-bottom: 15px;
        }
        .btn-link {
            display: inline-block;
            background-color: #ff4747;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn-link:hover {
            background-color: #e03131;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Smart Deals Pakistan</h1>
    <p class="urdu-text">پاکستان میں دستیاب بہترین آن لائن ڈیلز۔ موبائل ایکسیسریز, فیشن اور دیگر معیاری مصنوعات یہاں دیکھیں۔ قیمت اور بہترین کوالٹی کا واحد مرکز۔</p>

    <div class="product-card">
        <div class="product-title">Wireless Bluetooth Headphones</div>
        <p>HD Sound | Long Battery | Best for Calls & Music</p>
        <a href="https://s.click.aliexpress.com/e/_c3VVwP93" target="_blank" class="btn-link">Buy on AliExpress</a>
    </div>
</div>

</body>
</html>
